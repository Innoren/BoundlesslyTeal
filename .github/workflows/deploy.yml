name: Deploy to Bluehost

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: /home2/odilaxmy/public_html/
          log-level: verbose
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/node_modules/**
            **/*.py
            **/BoundlesslyTealHTML.html
            **/BoundlesslyTealHTML_backup.html
            **/index_backup2.html
            **/add-i18n-complete.html
            **/add-translations.js
            **/README.md
